name: 构建全平台汉化版

on:
  workflow_dispatch:
    inputs:
      upstream_tag:
        description: 'Voltius 上游版本 (如 v0.9.2，留空自动获取最新版)'
        required: false
        type: string
        default: ''
      
  push:
    tags:
      - 'zh-v*'
    branches:
      - main
    paths:
      - 'locales/zh-CN/**'
      - 'localize.py'
      - '.github/workflows/build-all-platforms.yml'
  
  schedule:
    # 每周一 UTC 02:00 (北京时间 10:00) 自动检查上游更新
    - cron: '0 2 * * 1'

permissions:
  contents: write

jobs:
  # 第一步: 准备汉化源码
  prepare-localized-source:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
    steps:
      - name: Checkout 汉化项目
        uses: actions/checkout@v7
        with:
          path: localize-tool
      
      - name: 安装 Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      
      - name: 克隆并汉化 Voltius
        working-directory: localize-tool
        run: |
          # 确定上游 Voltius 版本:
          #   1. 手动触发且指定版本: 使用 inputs.upstream_tag
          #   2. tag 触发 (zh-vX.Y.Z-N): 从 tag 名提取 vX.Y.Z
          #   3. 其他情况: 自动获取上游最新 release
          if [[ -n "${{ github.event.inputs.upstream_tag }}" ]]; then
            TAG="${{ github.event.inputs.upstream_tag }}"
            echo "📌 使用手动指定版本: $TAG"
          elif [[ "${{ github.ref }}" == refs/tags/zh-v* ]]; then
            # zh-v0.9.2-1 -> v0.9.2
            TAG=$(echo "${{ github.ref_name }}" | sed -E 's/^zh-(v[0-9]+\.[0-9]+\.[0-9]+).*/\1/')
            echo "📌 从 tag 提取版本: $TAG"
          else
            # 自动获取上游最新 release
            TAG=$(curl -s "https://api.github.com/repos/VoltiusApp/voltius/releases/latest" | jq -r '.tag_name')
            if [[ -z "$TAG" || "$TAG" == "null" ]]; then
              echo "⚠️ 无法获取上游最新版本,使用 main 分支"
              TAG="main"
            else
              echo "✨ 自动获取上游最新版本: $TAG"
            fi
          fi

          if [[ "$TAG" == "main" ]]; then
            python3 localize.py --repo voltius --patch
          else
            git clone --depth 1 --branch "$TAG" https://github.com/VoltiusApp/voltius.git voltius
            python3 localize.py --patch
          fi
      
      - name: 提取版本号
        id: extract
        working-directory: localize-tool/voltius
        run: |
          VERSION=$(jq -r '.version' src-tauri/tauri.conf.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "✅ 汉化版本: $VERSION"
      
      - name: 上传汉化后的源码
        uses: actions/upload-artifact@v7
        with:
          name: voltius-localized-source
          path: localize-tool/voltius/
          retention-days: 1

  # 第二步: 多平台构建
  build-platforms:
    needs: prepare-localized-source
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x64
          - platform: 'ubuntu-latest'
            target: 'x86_64-unknown-linux-gnu'
            args: ''
            os_label: 'Linux-x64'
          
          # Linux ARM64
          - platform: 'ubuntu-24.04-arm'
            target: 'aarch64-unknown-linux-gnu'
            args: ''
            os_label: 'Linux-arm64'
          
          # Windows x64
          - platform: 'windows-latest'
            target: 'x86_64-pc-windows-msvc'
            args: ''
            os_label: 'Windows-x64'
          
          # Windows ARM64
          - platform: 'windows-latest'
            target: 'aarch64-pc-windows-msvc'
            args: '--target aarch64-pc-windows-msvc'
            os_label: 'Windows-arm64'
          
          # macOS x64 (Intel)
          - platform: 'macos-latest'
            target: 'x86_64-apple-darwin'
            args: '--target x86_64-apple-darwin'
            os_label: 'macOS-Intel'
          
          # macOS ARM64 (Apple Silicon)
          - platform: 'macos-latest'
            target: 'aarch64-apple-darwin'
            args: '--target aarch64-apple-darwin'
            os_label: 'macOS-M1'

    runs-on: ${{ matrix.platform }}
    steps:
      - name: 下载汉化源码
        uses: actions/download-artifact@v8
        with:
          name: voltius-localized-source
          path: voltius
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10
      
      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 'lts/*'
          cache: 'pnpm'
          cache-dependency-path: voltius/pnpm-lock.yaml
      
      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
          workspaces: 'voltius/src-tauri -> target'
      
      - name: 安装系统依赖 (Ubuntu)
        if: matrix.platform == 'ubuntu-latest' || matrix.platform == 'ubuntu-24.04-arm'
        run: |
          # 修复 ARM64 runner IPv6 网络不可达问题
          if [[ "${{ matrix.platform }}" == "ubuntu-24.04-arm" ]]; then
            echo 'Acquire::ForceIPv4 "true";' | sudo tee /etc/apt/apt.conf.d/99force-ipv4
            echo 'Acquire::Retries "5";' | sudo tee -a /etc/apt/apt.conf.d/99force-ipv4
          fi
          
          # 更新并安装依赖,失败时清理缓存重试(ARM64 网络极不稳定)
          success=false
          for i in {1..5}; do
            echo "📦 尝试安装依赖 ($i/5)..."
            
            # 清理缓存
            sudo apt-get clean
            sudo rm -rf /var/lib/apt/lists/*
            
            # 更新源
            if ! sudo apt-get update; then
              echo "⚠️ apt-get update 失败，15秒后重试..."
              sleep 15
              continue
            fi
            
            # 安装依赖
            if sudo apt-get install -y \
              libwebkit2gtk-4.1-dev \
              libappindicator3-dev \
              librsvg2-dev \
              patchelf \
              libsecret-1-dev \
              xdg-utils; then
              echo "✅ 依赖安装成功"
              success=true
              break
            else
              echo "⚠️ 安装失败 ($i/5)，等待 20 秒后重试..."
              sleep 20
            fi
          done
          
          if [ "$success" != "true" ]; then
            echo "❌ 依赖安装失败 5 次，构建终止"
            exit 1
          fi
          
          # 验证关键依赖
          pkg-config --exists glib-2.0 gobject-2.0 webkit2gtk-4.1 || {
            echo "❌ 关键库验证失败，依赖未正确安装"
            exit 1
          }
          echo "✅ 依赖验证通过"
      
      - name: 安装前端依赖
        working-directory: voltius
        run: pnpm install --frozen-lockfile
      
      - name: 构建 Tauri 应用
        working-directory: voltius
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          rustup target add ${{ matrix.target }}
          pnpm tauri build ${{ matrix.args }}
      
      - name: 重命名产物 (添加 zh-CN 标识)
        shell: bash
        run: |
          # 动态检测构建产物路径(原生构建无 target triple)
          if [ -d "voltius/target/${{ matrix.target }}/release/bundle" ]; then
            BUNDLE_DIR="voltius/target/${{ matrix.target }}/release/bundle"
          elif [ -d "voltius/target/release/bundle" ]; then
            BUNDLE_DIR="voltius/target/release/bundle"
          else
            echo "❌ 找不到构建产物目录"
            exit 1
          fi
          echo "📦 产物目录: $BUNDLE_DIR"
          echo "BUNDLE_DIR=$BUNDLE_DIR" >> "$GITHUB_ENV"
          cd "$BUNDLE_DIR"
          
          # 根据平台重命名
          case "${{ matrix.platform }}" in
            ubuntu*)
              # Linux: .deb (deb/), .rpm (rpm/), .AppImage (appimage/) 在各自子目录
              if [ -d "deb" ]; then
                cd deb
                for file in *.deb; do
                  [ -f "$file" ] || continue
                  newname="${file%.deb}_zh-CN.deb"
                  mv "$file" "$newname"
                  echo "✅ 重命名: $file -> $newname"
                done
                cd ..
              fi
              if [ -d "rpm" ]; then
                cd rpm
                for file in *.rpm; do
                  [ -f "$file" ] || continue
                  newname="${file%.rpm}_zh-CN.rpm"
                  mv "$file" "$newname"
                  echo "✅ 重命名: $file -> $newname"
                done
                cd ..
              fi
              if [ -d "appimage" ]; then
                cd appimage
                for file in *.AppImage; do
                  [ -f "$file" ] || continue
                  newname="${file%.AppImage}_zh-CN.AppImage"
                  mv "$file" "$newname"
                  echo "✅ 重命名: $file -> $newname"
                done
                cd ..
              fi
              ;;
            windows*)
              # Windows: .msi, .exe
              if [ -d "msi" ]; then
                cd msi
                for file in *.msi; do
                  [ -f "$file" ] || continue
                  newname="${file%.msi}_zh-CN.msi"
                  mv "$file" "$newname"
                  echo "✅ 重命名: $file -> $newname"
                done
                cd ..
              fi
              if [ -d "nsis" ]; then
                cd nsis
                for file in *-setup.exe; do
                  [ -f "$file" ] || continue
                  newname="${file%-setup.exe}_zh-CN-setup.exe"
                  mv "$file" "$newname"
                  echo "✅ 重命名: $file -> $newname"
                done
                cd ..
              fi
              ;;
            macos*)
              # macOS: .dmg, .app.tar.gz
              if [ -d "dmg" ]; then
                cd dmg
                for file in *.dmg; do
                  [ -f "$file" ] || continue
                  newname="${file%.dmg}_zh-CN.dmg"
                  mv "$file" "$newname"
                  echo "✅ 重命名: $file -> $newname"
                done
                cd ..
              fi
              if [ -d "macos" ]; then
                cd macos
                for file in *.app.tar.gz; do
                  [ -f "$file" ] || continue
                  newname="${file%.app.tar.gz}_zh-CN.app.tar.gz"
                  mv "$file" "$newname"
                  echo "✅ 重命名: $file -> $newname"
                done
              fi
              ;;
          esac
      
      - name: 上传 Linux 安装包
        if: matrix.platform == 'ubuntu-latest' || matrix.platform == 'ubuntu-24.04-arm'
        uses: actions/upload-artifact@v7
        with:
          name: Voltius-${{ matrix.os_label }}-zh-CN
          path: |
            ${{ env.BUNDLE_DIR }}/deb/*_zh-CN.deb
            ${{ env.BUNDLE_DIR }}/rpm/*_zh-CN.rpm
            ${{ env.BUNDLE_DIR }}/appimage/*_zh-CN.AppImage
          if-no-files-found: warn
      
      - name: 上传 Windows 安装包
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v7
        with:
          name: Voltius-${{ matrix.os_label }}-zh-CN
          path: |
            ${{ env.BUNDLE_DIR }}/msi/*_zh-CN.msi
            ${{ env.BUNDLE_DIR }}/nsis/*_zh-CN-setup.exe
          if-no-files-found: warn
      
      - name: 上传 macOS 安装包
        if: matrix.platform == 'macos-latest'
        uses: actions/upload-artifact@v7
        with:
          name: Voltius-${{ matrix.os_label }}-zh-CN
          path: |
            ${{ env.BUNDLE_DIR }}/dmg/*_zh-CN.dmg
            ${{ env.BUNDLE_DIR }}/macos/*_zh-CN.app.tar.gz
          if-no-files-found: warn

  # 第三步: Android 构建
  build-android:
    needs: prepare-localized-source
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: 下载汉化源码
        uses: actions/download-artifact@v8
        with:
          name: voltius-localized-source
          path: voltius
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10
      
      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 'lts/*'
          cache: 'pnpm'
          cache-dependency-path: voltius/pnpm-lock.yaml
      
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v4
      
      - name: Install Android NDK
        run: |
          sdkmanager "ndk;26.1.10909125"
          echo "NDK_HOME=$ANDROID_SDK_ROOT/ndk/26.1.10909125" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/26.1.10909125" >> "$GITHUB_ENV"
      
      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android
      
      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          key: aarch64-linux-android
          workspaces: 'voltius/src-tauri -> target'
      
      - name: 安装前端依赖
        working-directory: voltius
        run: pnpm install --frozen-lockfile
      
      - name: 生成调试密钥库 (仅用于签名,非官方发布)
        run: |
          keytool -genkey -v \
            -keystore $RUNNER_TEMP/voltius-zh.keystore \
            -alias voltius \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass voltius123 -keypass voltius123 \
            -dname "CN=Voltius ZH-CN Community, OU=Localization, O=Community, L=Shanghai, ST=Shanghai, C=CN"
          echo "ANDROID_KEYSTORE_PATH=$RUNNER_TEMP/voltius-zh.keystore" >> "$GITHUB_ENV"
      
      - name: 构建 Android APK
        working-directory: voltius
        env:
          ANDROID_KEYSTORE_PASSWORD: voltius123
          ANDROID_KEY_ALIAS: voltius
          ANDROID_KEY_PASSWORD: voltius123
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm tauri android build --apk --target aarch64
      
      - name: 重命名 APK
        run: |
          VERSION=${{ needs.prepare-localized-source.outputs.version }}
          src="voltius/src-tauri/gen/android/app/build/outputs/apk/universal/release/app-universal-release.apk"
          dest="Voltius_${VERSION}_aarch64_zh-CN.apk"
          mv "$src" "$dest"
          echo "✅ APK: $dest"
      
      - name: 上传 Android APK
        uses: actions/upload-artifact@v7
        with:
          name: Voltius-Android-zh-CN
          path: Voltius_*_zh-CN.apk

  # 第四步: 生成 Release
  create-release:
    needs: [prepare-localized-source, build-platforms, build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/zh-v')
    steps:
      - name: 下载所有产物
        uses: actions/download-artifact@v8
        with:
          path: artifacts
      
      - name: 生成发布说明
        run: |
          VERSION="${{ needs.prepare-localized-source.outputs.version }}"
          UPSTREAM_TAG="${{ github.event.inputs.upstream_tag || 'latest' }}"
          
          cat > release-notes.md <<EOF
          # Voltius ${VERSION} 简体中文版
          
          基于 [Voltius ${UPSTREAM_TAG}](https://github.com/VoltiusApp/voltius/releases/tag/${UPSTREAM_TAG}) 官方版本构建
          
          ## 📦 安装说明
          
          ### Windows
          - **x64 (Intel/AMD)**: 下载 \`*Windows-x64*_zh-CN.msi\`
          - **ARM64 (骁龙)**: 下载 \`*Windows-arm64*_zh-CN.msi\`
          - 运行安装后，打开 Voltius → Settings → Language → 选择 **简体中文**
          
          ### macOS
          - **Intel Mac**: 下载 \`*macOS-Intel*_zh-CN.dmg\`
          - **Apple Silicon (M1/M2/M3)**: 下载 \`*macOS-M1*_zh-CN.dmg\`
          - 拖入 Applications 文件夹，首次运行右键 → 打开
          
          ### Linux
          - **Ubuntu/Debian**: 下载 \`*.deb\`，运行 \`sudo dpkg -i <文件名>\`
          - **Fedora/RHEL**: 下载 \`*.rpm\`，运行 \`sudo dnf install <文件名>\`
          - **AppImage**: 下载 \`.AppImage\`，添加执行权限后直接运行
          
          ### Android
          - 下载 \`Voltius_*_aarch64_zh-CN.apk\`
          - 启用"未知来源"后安装(侧载方式，非 Play Store)
          
          ## 🌍 翻译状态
          - ✅ 核心 UI: 已完成
          - ⚠️ 设置页面: 进行中
          - ⚠️ 帮助文档: 待翻译
          
          ## ⚠️ 注意事项
          1. **覆盖安装**: 可直接覆盖官方版，数据不丢失
          2. **签名问题**: 非官方签名，部分系统会有安全警告(安全,可信任)
          3. **Android 密钥**: 使用社区调试密钥签名，首次安装需卸载官方版
          
          ## 🙏 致谢
          - [Voltius](https://github.com/VoltiusApp/voltius) 官方团队
          - 所有翻译贡献者
          
          ---
          构建时间: $(date -u +"%Y-%m-%d %H:%M:%S UTC")  
          构建来源: ${{ github.repository }}
          EOF
      
      - name: 删除所有旧 Release（创建新版前清理）
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "🗑️ 清理所有旧的 zh-v* Release（包括同名旧版）"
          
          # 获取所有 zh-v* release
          RELEASES=$(gh release list --repo "${{ github.repository }}" \
            --limit 100 \
            --json tagName \
            --jq '.[] | select(.tagName | startswith("zh-v")) | .tagName')
          
          if [ -z "$RELEASES" ]; then
            echo "✅ 没有旧 Release 需要删除"
          else
            echo "以下 Release 将被删除:"
            echo "$RELEASES"
            for TAG in $RELEASES; do
              echo "删除 $TAG ..."
              gh release delete "$TAG" --repo "${{ github.repository }}" --yes --cleanup-tag || true
            done
            echo "✅ 旧 Release 清理完成"
          fi
      
      - name: 创建 GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.prepare-localized-source.outputs.version }}"
          
          # 确定 Release 的 tag
          if [[ "${{ github.ref }}" == refs/tags/zh-v* ]]; then
            TAG="${{ github.ref_name }}"
          else
            TAG="zh-v${VERSION}-${{ github.run_number }}"
          fi
          echo "📦 发布 Release: $TAG"
          
          # 收集各平台二进制文件（排除 .zip 压缩包）
          cd artifacts
          FILES=$(find . -type f \
            \( -name "*_zh-CN.msi" \
            -o -name "*_zh-CN.exe" \
            -o -name "*_zh-CN.dmg" \
            -o -name "*_zh-CN.deb" \
            -o -name "*_zh-CN.rpm" \
            -o -name "*_zh-CN.AppImage" \
            -o -name "*_zh-CN.apk" \) \
            | sed 's|^\./||')
          
          echo "📦 待上传文件:"
          echo "$FILES"
          echo ""
          
          FILE_COUNT=$(echo "$FILES" | wc -l)
          echo "✅ 共 $FILE_COUNT 个文件"
          cd ..
          
          # 创建 Release（只上传安装包/二进制）
          if [ -n "$FILES" ]; then
            # 转换为带 artifacts/ 前缀的路径列表
            UPLOAD_FILES=$(echo "$FILES" | sed 's|^|artifacts/|' | tr '\n' ' ')
            
            gh release create "$TAG" \
              --repo "${{ github.repository }}" \
              --title "Voltius ${VERSION} 简体中文版" \
              --notes-file release-notes.md \
              $UPLOAD_FILES \
            || gh release upload "$TAG" $UPLOAD_FILES \
              --repo "${{ github.repository }}" \
              --clobber
          else
            echo "❌ 未找到任何安装包文件"
            exit 1
          fi
      
  # ============================================================
  # 清理旧的 workflow 记录
  # ============================================================
  cleanup:
    name: 清理旧 workflow
    needs: [create-release]
    runs-on: ubuntu-latest
    if: always()
    permissions:
      actions: write
      contents: read
    steps:
      - name: 删除旧的 workflow 运行记录
        uses: Mattraks/delete-workflow-runs@v2
        with:
          repository: ${{ github.repository }}
          retain_days: 1
          keep_minimum_runs: 0
